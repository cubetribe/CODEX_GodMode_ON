name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate local environment contract
        run: ./scripts/check-local-env.sh

  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Write repo-compatible markdownlint config
        run: |
          cat > .markdownlint.jsonc <<'EOF'
          {
            "MD013": false,
            "MD024": false,
            "MD033": false,
            "MD041": false
          }
          EOF
      - name: Lint maintainer Markdown surfaces
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20.0.0
        with:
          globs: |
            AGENTS.md
            CHANGELOG.md
            CONTRIBUTING.md
            README.md
            docs/**/*.md
            .agents/skills/*/SKILL.md
            templates/**/*.md
